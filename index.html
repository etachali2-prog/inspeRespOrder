<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic/Electrician Assignment Form</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        input, textarea {
            padding: 5px;
            width: 250px;
        }
        textarea {
            vertical-align: top;
            height: 60px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<h4>Mechanic/Electrician Assignment Form to Respond to Inspection Results</h4>
    <form id="assignmentForm">
        
        
        <div class="form-group">
            <label for="assigned-by">Team leader/Senior:</label>
            <input type="text" id="assigned-by" name="team leader or senior" required>
        </div>

        <div class="form-group">
            <label for="assignee">Assigned Electrician/Mechanic:</label>
            <input type="text" id="assignee" name="Assigned_Electrician_Mechanic" required>
        </div>

        <div class="form-group">
            <label for="machine-name">Machine Name:</label>
            <input type="text" id="machine-name" name="machine_name" required>
        </div>

        <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required>
        </div>

        <div class="form-group">
            <label for="problem">Problem Encountered:</label>
            <textarea id="problem" name="problem" required></textarea>
        </div>
        
        <div class="form-group">
            <button type="submit" id="submitBtn">Submit Assignment</button>
        </div>
    </form>

    <script>
        // Paste your deployed Google Web App URL here
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbx6TGTzybt_Ft319wRgQQK7j1C07hsC9D_urbTy9FxDfTOOoylzfA9QAVmWRHEL57Uf3g/exec'; 

        document.getElementById('assignmentForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the page from reloading
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            // Gather data from the form fields
            const formData = {
                assigned_by: document.getElementById('assigned-by').value,
                assignee: document.getElementById('assignee').value,
                machine_name: document.getElementById('machine-name').value,
                location: document.getElementById('location').value,
                problem: document.getElementById('problem').value
            };

            // Send data to Google Apps Script
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Critical for cross-domain requests to Google Scripts
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert('Assignment successfully recorded in Google Sheets!');
                document.getElementById('assignmentForm').reset(); // Clear form
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Something went wrong. Please try again.');
            })
            .finally(() => {
                submitBtn.textContent = 'Submit Assignment';
                submitBtn.disabled = false;
            });
        });
    </script>

</body>
</html>
