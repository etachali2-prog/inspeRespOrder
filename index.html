<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanic/Electrician Assignment Form</title>
    <style>
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: inline-block;
            width: 200px;
            font-weight: bold;
        }
        input, textarea {
            padding: 5px;
            width: 250px;
        }
        textarea {
            vertical-align: top;
            height: 60px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h4>Mechanic/Electrician Assignment Form to Respond to Inspection Results</h4>
    
    <form id="assignmentForm">
        
        <div class="form-group">
            <label for="assigned_by">Team Leader/Senior:</label>
            <input type="text" id="assigned_by" name="Team Leader/Senior" required>
        </div>

        <div class="form-group">
            <label for="assignee">Assigned Electrician/Mechanic:</label>
            <input type="text" id="assignee" name="Assigned Electrician/Mechanic" required>
        </div>

        <div class="form-group">
            <label for="machine_name">Machine Name:</label>
            <input type="text" id="machine_name" name="machine_name" required>
        </div>

        <div class="form-group">
            <label for="location">Location:</label>
            <input type="text" id="location" name="location" required>
        </div>

        <div class="form-group">
            <label for="problem">Problem Encountered:</label>
            <textarea id="problem" name="problem" required></textarea>
        </div>
        
        <div class="form-group">
            <button type="submit" id="submitBtn">Submit Assignment</button>
        </div>
    </form>

    <script>
        // PASTE YOUR NEW GOOGLE WEB APP URL HERE:
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzw0Uq9OrfKbBj_SWO5ac0aUrknQeRWbip0Ejz38HoxDUps21GdnnU76639n3o93WcJ-Q/exec'; 

        document.getElementById('assignmentForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the page from reloading
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.textContent = 'Sending...';
            submitBtn.disabled = true;

            // Gather data from the form fields (Fixed: assigned_by ID selector fixed!)
            const formData = {
                assigned_by: document.getElementById('assigned_by').value,
                assignee: document.getElementById('assignee').value,
                machine_name: document.getElementById('machine_name').value,
                location: document.getElementById('location').value,
                problem: document.getElementById('problem').value
            };

            // Send data to Google Apps Script
            fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // Critical for cross-domain requests to Google Scripts
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert('Assignment successfully recorded!');
                document.getElementById('assignmentForm').reset(); // Clear form
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Something went wrong. Please try again.');
            })
            .finally(() => {
                submitBtn.textContent = 'Submit Assignment';
                submitBtn.disabled = false;
            });
        });
    </script>

</body>
</html>
